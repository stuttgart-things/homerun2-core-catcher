---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.fullName }}
  description: ${{ values.description }}
  annotations:
    github.com/project-slug: ${{ values.orgName }}/${{ values.fullName }}
    backstage.io/techdocs-ref: url:https://github.com/${{ values.orgName }}/${{ values.fullName }}/tree/main
    backstage.io/source-location: url:https://github.com/${{ values.orgName }}/${{ values.fullName }}
  tags:
    - ${{ values.serviceType }}
    - redis
    - golang
    - homerun2
  links:
    - url: https://github.com/${{ values.orgName }}/${{ values.fullName }}
      title: GitHub Repository
      icon: github
spec:
  type: service
  lifecycle: production
  owner: platform-team
  system: homerun2
  dependsOn:
    - resource:redis
