apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: homerun2-service
  title: Homerun2 Service
  description: Scaffold a new homerun2 microservice (pitcher or catcher)
  tags:
    - go
    - redis
    - homerun2
    - microservice
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Service Configuration
      required:
        - serviceName
        - serviceType
        - description
      properties:
        serviceName:
          title: Service Name
          type: string
          description: Name of the service (e.g., core-catcher, omni-pitcher)
          pattern: "^[a-z][a-z0-9-]+$"
          ui:autofocus: true
        serviceType:
          title: Service Type
          type: string
          description: Type of homerun2 service to create
          enum:
            - pitcher
            - catcher
          enumNames:
            - Pitcher (HTTP API → Redis Streams producer)
            - Catcher (Redis Streams consumer → processor)
        description:
          title: Description
          type: string
          description: Short description of the service

    - title: Redis Configuration
      properties:
        redisStream:
          title: Redis Stream Name
          type: string
          default: messages
          description: Name of the Redis stream to produce to or consume from
        consumerGroup:
          title: Consumer Group Name
          type: string
          default: ${{ parameters.serviceName }}
          description: Consumer group name (catcher only)

    - title: Repository Settings
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
            allowedOwners:
              - stuttgart-things

  steps:
    - id: fetch-skeleton
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          serviceName: ${{ parameters.serviceName }}
          serviceType: ${{ parameters.serviceType }}
          description: ${{ parameters.description }}
          redisStream: ${{ parameters.redisStream }}
          consumerGroup: ${{ parameters.consumerGroup }}
          orgName: stuttgart-things
          fullName: homerun2-${{ parameters.serviceName }}
          goModule: github.com/stuttgart-things/homerun2-${{ parameters.serviceName }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        allowedHosts:
          - github.com
        repoUrl: ${{ parameters.repoUrl }}
        description: ${{ parameters.description }}
        defaultBranch: main
        repoVisibility: public

    - id: register
      name: Register in Backstage
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
